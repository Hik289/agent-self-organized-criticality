<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">Agent SOC experimental pipeline</title>
  <desc id="desc">Pipeline from benchmark environments through long-horizon agent trajectories, state extraction, SOC diagnostics, and reported scientific claims.</desc>
  <defs>
    <style>
      .bg { fill: #fbfbfd; }
      .panel { fill: #ffffff; stroke: #d8dce6; stroke-width: 1.4; rx: 14; }
      .stage { fill: #eef4ff; stroke: #6d8edb; stroke-width: 1.6; rx: 12; }
      .stage2 { fill: #fff4e8; stroke: #e29b45; stroke-width: 1.6; rx: 12; }
      .stage3 { fill: #f2f8ee; stroke: #77a95b; stroke-width: 1.6; rx: 12; }
      .stage4 { fill: #f9eef6; stroke: #c86aa0; stroke-width: 1.6; rx: 12; }
      .chip { fill: #ffffff; stroke: #cbd2df; stroke-width: 1.1; rx: 8; }
      .arrow { stroke: #333846; stroke-width: 2.2; fill: none; marker-end: url(#arrowhead); }
      .title { font-family: Inter, Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #20242d; }
      .label { font-family: Inter, Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #20242d; }
      .text { font-family: Inter, Helvetica, Arial, sans-serif; font-size: 14px; fill: #343a46; }
      .small { font-family: Inter, Helvetica, Arial, sans-serif; font-size: 12px; fill: #596172; }
      .tiny { font-family: Inter, Helvetica, Arial, sans-serif; font-size: 11px; fill: #596172; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; fill: #343a46; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 Z" fill="#333846"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="520"/>
  <text class="title" x="640" y="48" text-anchor="middle">Agent SOC Pipeline</text>
  <text class="small" x="640" y="76" text-anchor="middle">Controlled perturbations reveal avalanches, weak chaos, memory, and scaling.</text>

  <rect class="panel" x="36" y="110" width="1208" height="348"/>

  <rect class="stage" x="70" y="150" width="170" height="190"/>
  <text class="label" x="155" y="184" text-anchor="middle">Benchmarks</text>
  <rect class="chip" x="92" y="208" width="126" height="28"/>
  <text class="small" x="155" y="226" text-anchor="middle">StatefulPuzzle</text>
  <rect class="chip" x="92" y="244" width="126" height="28"/>
  <text class="small" x="155" y="262" text-anchor="middle">Game of Life</text>
  <rect class="chip" x="92" y="280" width="126" height="28"/>
  <text class="tiny" x="155" y="298" text-anchor="middle">Tools + RAG</text>

  <path class="arrow" d="M250 245 C268 245 275 245 292 245"/>

  <rect class="stage2" x="300" y="150" width="170" height="190"/>
  <text class="label" x="385" y="184" text-anchor="middle">Agent Rollout</text>
  <text class="text" x="385" y="218" text-anchor="middle">Long-horizon</text>
  <text class="text" x="385" y="242" text-anchor="middle">trajectories under</text>
  <text class="mono" x="385" y="268" text-anchor="middle">stress σ, horizon H</text>
  <text class="mono" x="385" y="292" text-anchor="middle">surface shifts</text>

  <path class="arrow" d="M480 245 C498 245 505 245 522 245"/>

  <rect class="stage3" x="530" y="150" width="170" height="190"/>
  <text class="label" x="615" y="184" text-anchor="middle">State Extraction</text>
  <text class="text" x="615" y="218" text-anchor="middle">Trajectory state</text>
  <text class="text" x="615" y="242" text-anchor="middle">local-global judges</text>
  <text class="mono" x="615" y="268" text-anchor="middle">F(t), L(t), ΔLG</text>
  <text class="mono" x="615" y="292" text-anchor="middle">error series e(t)</text>

  <path class="arrow" d="M710 245 C728 245 735 245 752 245"/>

  <rect class="stage4" x="760" y="150" width="190" height="190"/>
  <text class="label" x="855" y="184" text-anchor="middle">SOC Diagnostics</text>
  <text class="mono" x="855" y="218" text-anchor="middle">Avalanche size A</text>
  <text class="mono" x="855" y="242" text-anchor="middle">Collapse time Tcol</text>
  <text class="mono" x="855" y="266" text-anchor="middle">Spectral slope α</text>
  <text class="mono" x="855" y="290" text-anchor="middle">Fractal Df</text>

  <path class="arrow" d="M960 245 C978 245 985 245 1002 245"/>

  <rect class="stage" x="1010" y="150" width="190" height="190"/>
  <text class="label" x="1105" y="184" text-anchor="middle">Scientific Tests</text>
  <text class="text" x="1105" y="218" text-anchor="middle">criticality</text>
  <text class="text" x="1105" y="242" text-anchor="middle">weak chaos</text>
  <text class="text" x="1105" y="266" text-anchor="middle">surface stability</text>
  <text class="text" x="1105" y="290" text-anchor="middle">universality</text>

  <rect class="chip" x="162" y="386" width="228" height="34"/>
  <text class="small" x="276" y="407" text-anchor="middle">22 experiments</text>
  <rect class="chip" x="426" y="386" width="228" height="34"/>
  <text class="small" x="540" y="407" text-anchor="middle">6 benchmarks</text>
  <rect class="chip" x="690" y="386" width="228" height="34"/>
  <text class="small" x="804" y="407" text-anchor="middle">seeded protocol</text>
  <rect class="chip" x="954" y="386" width="228" height="34"/>
  <text class="small" x="1068" y="407" text-anchor="middle">JSON logs + metrics</text>
</svg>
